<!doctype html>
<html lang="en" class="h-full">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Annix Read{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
</head>
<body class="h-full bg-stone-50 text-stone-900 antialiased">
    <header class="border-b border-stone-200 bg-white">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2 group">
                <span class="text-2xl">📖</span>
                <span class="text-xl font-semibold tracking-tight group-hover:text-amber-700 transition">Annix Read</span>
            </a>
            <nav class="text-sm text-stone-600">
                <a href="/" class="hover:text-stone-900">Browse</a>
            </nav>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="mt-16 border-t border-stone-200 bg-white">
        <div class="max-w-6xl mx-auto px-6 py-6 text-sm text-stone-500 flex justify-between flex-wrap gap-2">
            <span>Annix Read — AI-powered book summaries in 10 minutes.</span>
            <span>Free · Donations welcome.</span>
        </div>
    </footer>

    <script src="{{ url_for('static', path='app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
